services:
  ros:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    network_mode: "host"
    environment:
      - ROS_MASTER_URI=${ROS_MASTER_URI}
      - ROS_IP=${ROS_IP}
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1

    volumes:
      - ..:/catkin_ws/src/project:rw
      - /tmp/.X11-unix:/tmp/.X11-unix:rw

    command: bash