DWAPlannerROS:
  # Robot kinematics/limits (these are conservative)
  acc_lim_x: 0.8
  acc_lim_theta: 2.5
  max_vel_x: 0.5
  min_vel_x: 0.0
  max_vel_theta: 1.5
  min_vel_theta: 0.2
  min_in_place_vel_theta: 0.5

  # Goal tolerances
  yaw_goal_tolerance: 0.15         # ~8.6 deg
  xy_goal_tolerance: 0.15          # 15 cm
  latch_xy_goal_tolerance: true

  # Forward simulation and sampling
  sim_time: 2.0
  sim_granularity: 0.025
  vx_samples: 20
  vtheta_samples: 20

  # Scoring
  path_distance_bias: 32.0         # stick to global path
  goal_distance_bias: 20.0         # prefer progress to goal
  occdist_scale: 0.02              # obstacle cost weight (increase if too “brave”)
  forward_point_distance: 0.325
  stop_time_buffer: 0.2
  scaling_speed: 0.25
  max_scaling_factor: 0.2

  # Collision checking and oscillation
  prune_plan: true
  oscillation_reset_dist: 0.5

  # Map/footprint resolution alignment
  sim_period: 0.1
