local_costmap:
  global_frame: odom
  robot_base_frame: base_link
  update_frequency: 10.0
  publish_frequency: 5.0
  transform_tolerance: 0.2

  # Local rolling window around the robot
  rolling_window: true
  width: 5.0
  height: 5.0
  resolution: 0.05

  # Do not use the static map directly; rely on live obstacles
  static_map: false

  # Layers: obstacle layer (from laser) + inflation
  plugins:
    - {name: obstacle_layer, type: "costmap_2d::ObstacleLayer"}
    - {name: inflation_layer, type: "costmap_2d::InflationLayer"}

  # Obstacle layer settings (consumes LaserScan from costmap_common.yaml)
  obstacle_layer:
    observation_sources: laser_scan
    laser_scan:
      data_type: LaserScan
      topic: /scan                 # must match costmap_common.yaml or your laser topic
      marking: true
      clearing: true
      inf_is_valid: true
      expected_update_rate: 0.0
    obstacle_range: 3.0            # mirrors common settings
    raytrace_range: 4.0

  # Inflation around obstacles
  inflation_layer:
    inflation_radius: 0.45
    cost_scaling_factor: 5.0
