services:
  stretch_nav:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: stretch_nav
    network_mode: host
    privileged: true

    # Load env from .env (ROS_MASTER_URI, ROS_IP/ROS_HOSTNAME, device paths, QT_X11_NO_MITSHM)
    env_file:
      - .env

    extra_hosts:
      - "stretch-re2-2053:10.42.0.1" 

    environment:
      # Pass host X11 display into the container (Compose substitutes ${DISPLAY} from host)
      - DISPLAY=${DISPLAY}
      # Use value from .env instead of hardcoding
      - QT_X11_NO_MITSHM=${QT_X11_NO_MITSHM}
      # Optional: only used when running TurtleBot3 Gazebo
      - TURTLEBOT3_MODEL=burger

    volumes:
      # X11 socket for RViz
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      # Mount your repo so entrypoint can sync navigation_pkg
      - /home/radiuss/26P11:/root/ws:rw           #lab laptop directory

    # Devices: uncomment when at the robot and you know the paths exist
    # If you’re away from the robot, leave these commented to avoid startup errors
    # devices:
    #   - ${STRETCH_DEV}:${STRETCH_DEV}   # e.g., /dev/ttyACM0 (base)
    #   - ${LIDAR_DEV}:${LIDAR_DEV}       # e.g., /dev/ttyUSB0 (RP LiDAR)

    group_add:
      - dialout
      - plugdev

    stdin_open: true
    tty: true
    entrypoint: ["/entrypoint.sh"]
