version: "3.8"
services:
  stretch_nav:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: stretch_nav
    network_mode: host
    privileged: true
    env_file:
      - .env
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - ROS_MASTER_URI=http://localhost:11311
      - ROS_HOSTNAME=localhost
      # Set this for sim: use host clock; Gazebo also publishes /clock
      - TURTLEBOT3_MODEL=burger
    volumes:
      # Mount X11 for RViz
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      # Mount your repo so entrypoint can sync navigation_pkg
      - ../:/root/ws:rw
    devices:
      # Real robot: pass devices (edit paths to match your host)
      - ${STRETCH_DEV}:${STRETCH_DEV}   # e.g., /dev/ttyACM0 (base)
      - ${LIDAR_DEV}:${LIDAR_DEV}       # e.g., /dev/ttyUSB0 (RP LiDAR)
    group_add:
      - dialout
      - plugdev
    stdin_open: true
    tty: true
    entrypoint: ["/entrypoint.sh"]
